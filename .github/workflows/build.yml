name: Build Bingo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev \
          libqt6svg6-dev libgl1-mesa-dev libboost-regex-dev cmake ninja-build

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      run: cmake --build build

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-linux
        path: build/bingo

  build-windows:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 cmake ninja-build wine64 wget unzip

    - name: Download and setup Qt6 for MinGW
      run: |
        # Install aqtinstall for Qt installation
        pip3 install aqtinstall

        # Install Qt6 for Windows with MinGW
        mkdir -p $HOME/Qt
        aqt install-qt windows desktop 6.5.3 win64_mingw -m qtsvg qtdeclarative -O $HOME/Qt

        # Download and extract Boost for MinGW
        wget https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.gz
        tar xzf boost_1_83_0.tar.gz

        echo "Qt6_DIR=$HOME/Qt/6.5.3/mingw_64" >> $GITHUB_ENV
        echo "BOOST_ROOT=$PWD/boost_1_83_0" >> $GITHUB_ENV

    - name: Setup MinGW toolchain
      run: |
        cat > toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Windows)
        set(CMAKE_SYSTEM_PROCESSOR x86_64)

        set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
        set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
        set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)

        set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)

        set(CMAKE_PREFIX_PATH "$ENV{Qt6_DIR}")
        EOF

    - name: Configure CMake for Windows
      run: |
        mkdir build-win
        cd build-win
        cmake -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=../toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DQt6_DIR=$Qt6_DIR/lib/cmake/Qt6 \
          -DBoost_INCLUDE_DIR=$BOOST_ROOT \
          ..

    - name: Build for Windows
      run: cmake --build build-win

    - name: Package Windows build
      run: |
        mkdir -p bingo-windows
        cp build-win/bingo.exe bingo-windows/

        # Copy imgs folder
        cp -r imgs bingo-windows/

        # Copy Qt DLLs
        cp $Qt6_DIR/bin/Qt6Core.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6Gui.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6Widgets.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6Svg.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6Qml.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6Quick.dll bingo-windows/
        cp $Qt6_DIR/bin/Qt6QuickWidgets.dll bingo-windows/

        # Copy Qt plugins
        mkdir -p bingo-windows/platforms
        cp $Qt6_DIR/plugins/platforms/qwindows.dll bingo-windows/platforms/

        # Copy MinGW runtime
        cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll bingo-windows/ || true
        cp /usr/lib/gcc/x86_64-w64-mingw32/*/libstdc++-6.dll bingo-windows/ || true
        cp /usr/lib/gcc/x86_64-w64-mingw32/*/libgcc_s_seh-1.dll bingo-windows/ || true

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-windows
        path: bingo-windows/

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        cd bingo-windows && zip -r ../bingo-windows.zip . && cd ..
        tar czf bingo-linux.tar.gz bingo-linux/

    - name: Upload release assets
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          bingo-windows.zip
          bingo-linux.tar.gz
