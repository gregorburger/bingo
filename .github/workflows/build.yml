name: Build Bingo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev \
          libqt6svg6-dev libgl1-mesa-dev cmake ninja-build

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      run: cmake --build build

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-linux
        path: build/bingo

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-svg
          mingw-w64-x86_64-qt6-declarative
          mingw-w64-x86_64-qt6-tools

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      shell: msys2 {0}
      run: cmake --build build

    - name: Package Windows build
      shell: msys2 {0}
      run: |
        mkdir -p bingo-windows
        cp build/bingo.exe bingo-windows/

        # Copy imgs folder
        cp -r imgs bingo-windows/

        # Copy Qt DLLs
        ldd build/bingo.exe | grep mingw64 | awk '{print $3}' | xargs -I{} cp {} bingo-windows/

        # Copy Qt plugins
        mkdir -p bingo-windows/platforms
        cp /mingw64/share/qt6/plugins/platforms/qwindows.dll bingo-windows/platforms/ || true

        # Create qt.conf to help Qt find plugins
        cat > bingo-windows/qt.conf << 'EOF'
        [Paths]
        Plugins = platforms
        EOF

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-windows
        path: bingo-windows/

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6
      run: |
        brew install qt@6 ninja

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" ..

    - name: Build
      run: cmake --build build

    - name: Deploy Qt dependencies
      run: |
        "$(brew --prefix qt@6)/bin/macdeployqt" build/bingo.app -verbose=2

    - name: Create DMG
      run: |
        cd build
        cpack -G DragNDrop

    - name: Find and rename DMG
      run: |
        DMG_FILE=$(find build -name "*.dmg" -type f -not -path "*/build/_CPack_Packages/*" | head -n 1)
        if [ -n "$DMG_FILE" ]; then
          mv "$DMG_FILE" build/bingo-macos.dmg
          echo "DMG created: build/bingo-macos.dmg"
        else
          echo "Error: No DMG file found"
          exit 1
        fi

    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: bingo-macos
        path: build/bingo-macos.dmg

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        cd bingo-windows && zip -r ../bingo-windows.zip . && cd ..
        tar czf bingo-linux.tar.gz bingo-linux/
        # macOS DMG is already ready, just rename it
        mv bingo-macos/bingo-macos.dmg ./

    - name: Get short commit SHA
      id: sha
      run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Create or update latest release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Automated build from commit ${{ steps.sha.outputs.short }}

          **Built from**: `${{ github.ref_name }}`
          **Commit**: ${{ github.sha }}
          **Date**: ${{ github.event.head_commit.timestamp }}
        files: |
          bingo-windows.zip
          bingo-linux.tar.gz
          bingo-macos.dmg
        prerelease: false
        draft: false
        make_latest: true
