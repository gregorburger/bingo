name: Build Bingo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev \
          libqt6svg6-dev libgl1-mesa-dev cmake ninja-build

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      run: cmake --build build

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-linux
        path: build/bingo

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-svg
          mingw-w64-x86_64-qt6-declarative
          mingw-w64-x86_64-qt6-tools

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      shell: msys2 {0}
      run: cmake --build build

    - name: Package Windows build
      shell: msys2 {0}
      run: |
        mkdir -p bingo-windows
        cp build/bingo.exe bingo-windows/

        # Copy imgs folder
        cp -r imgs bingo-windows/

        # Copy Qt DLLs
        ldd build/bingo.exe | grep mingw64 | awk '{print $3}' | xargs -I{} cp {} bingo-windows/

        # Copy Qt plugins
        mkdir -p bingo-windows/platforms
        cp /mingw64/share/qt6/plugins/platforms/qwindows.dll bingo-windows/platforms/ || true

        # Create qt.conf to help Qt find plugins
        cat > bingo-windows/qt.conf << 'EOF'
        [Paths]
        Plugins = platforms
        EOF

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-windows
        path: bingo-windows/

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        cd bingo-windows && zip -r ../bingo-windows.zip . && cd ..
        tar czf bingo-linux.tar.gz bingo-linux/

    - name: Upload release assets
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          bingo-windows.zip
          bingo-linux.tar.gz
