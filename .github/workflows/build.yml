name: Build Bingo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev \
          libqt6svg6-dev libgl1-mesa-dev cmake ninja-build

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      run: cmake --build build

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-linux
        path: build/bingo

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-svg
          mingw-w64-x86_64-qt6-declarative
          mingw-w64-x86_64-qt6-tools

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      shell: msys2 {0}
      run: cmake --build build

    - name: Package Windows build
      shell: msys2 {0}
      run: |
        mkdir -p bingo-windows
        cp build/bingo.exe bingo-windows/

        # Copy imgs folder
        cp -r imgs bingo-windows/

        # Copy Qt DLLs
        ldd build/bingo.exe | grep mingw64 | awk '{print $3}' | xargs -I{} cp {} bingo-windows/

        # Copy Qt plugins
        mkdir -p bingo-windows/platforms
        cp /mingw64/share/qt6/plugins/platforms/qwindows.dll bingo-windows/platforms/ || true

        # Create qt.conf to help Qt find plugins
        cat > bingo-windows/qt.conf << 'EOF'
        [Paths]
        Plugins = platforms
        EOF

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-windows
        path: bingo-windows/

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6
      run: |
        brew install qt@6 ninja

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" ..

    - name: Build
      run: cmake --build build

    - name: Package macOS build
      run: |
        mkdir -p bingo-macos
        cp build/bingo bingo-macos/
        cp -r imgs bingo-macos/

        # Get Qt library path
        QT_LIB_PATH="$(brew --prefix qt@6)/lib"
        QT_PLUGINS_PATH="$(brew --prefix qt@6)/share/qt/plugins"

        # Copy Qt frameworks
        mkdir -p bingo-macos/Frameworks
        for framework in QtCore QtWidgets QtGui QtSvg QtQml QtQuick QtQuickWidgets QtPrintSupport QtDBus QtNetwork; do
          if [ -d "$QT_LIB_PATH/$framework.framework" ]; then
            echo "Copying $framework..."
            cp -R "$QT_LIB_PATH/$framework.framework" bingo-macos/Frameworks/
          else
            echo "Warning: $framework not found"
          fi
        done

        # Copy Qt plugins
        mkdir -p bingo-macos/PlugIns/platforms
        if [ -f "$QT_PLUGINS_PATH/platforms/libqcocoa.dylib" ]; then
          cp "$QT_PLUGINS_PATH/platforms/libqcocoa.dylib" bingo-macos/PlugIns/platforms/
        fi

        # Create qt.conf
        cat > bingo-macos/qt.conf << 'EOF'
        [Paths]
        Plugins = PlugIns
        EOF

        # Fix library paths
        cd bingo-macos
        install_name_tool -add_rpath @executable_path/Frameworks ./bingo

        # Update framework references in executable
        for framework in QtCore QtWidgets QtGui QtSvg QtQml QtQuick QtQuickWidgets QtPrintSupport QtDBus QtNetwork; do
          if [ -d "Frameworks/$framework.framework" ]; then
            install_name_tool -change \
              "$QT_LIB_PATH/$framework.framework/Versions/A/$framework" \
              "@rpath/$framework.framework/Versions/A/$framework" \
              ./bingo 2>/dev/null || true
          fi
        done

        # Verify what was packaged
        echo "=== Package contents ==="
        ls -la
        echo "=== Frameworks ==="
        ls -la Frameworks/ || echo "No Frameworks directory"

    - name: Upload macOS binary
      uses: actions/upload-artifact@v4
      with:
        name: bingo-macos
        path: bingo-macos/

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        cd bingo-windows && zip -r ../bingo-windows.zip . && cd ..
        tar czf bingo-linux.tar.gz bingo-linux/
        tar czf bingo-macos.tar.gz bingo-macos/

    - name: Upload release assets
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          bingo-windows.zip
          bingo-linux.tar.gz
          bingo-macos.tar.gz
